# FINAL nginx server block for the FastAPI public API. Drops in over
# api.assessments.revenueinstitute.com.conf after certbot certonly has
# issued certs.

server {
    listen 80;
    listen [::]:80;
    server_name api.assessments.revenueinstitute.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.assessments.revenueinstitute.com;

    ssl_certificate /etc/letsencrypt/live/assessments.revenueinstitute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/assessments.revenueinstitute.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    # SSE endpoints (spec §7.1, §9.1, §12.2) require unbuffered streaming.
    location ~ ^/(api/scoring-events|api/generation-events|api/generator/runs/[^/]+/events|a/[^/]+/code/run) {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
