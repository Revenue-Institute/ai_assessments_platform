# BOOTSTRAP nginx server block for the candidate + admin single-host front
# door. HTTP only; handles the ACME http-01 challenge so certbot can issue
# certs without touching this file or any of the box's existing server
# blocks.
#
# Stage 1 (this file):
#   sudo cp infra/nginx/assessments.revenueinstitute.com.conf \
#     /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/assessments.revenueinstitute.com.conf \
#     /etc/nginx/sites-enabled/
#   sudo nginx -t                              # MUST pass before reload
#   sudo systemctl reload nginx
#   sudo mkdir -p /var/www/html/.well-known/acme-challenge
#   sudo certbot certonly --webroot -w /var/www/html \
#     -d assessments.revenueinstitute.com \
#     -d api.assessments.revenueinstitute.com
#   # certonly does NOT modify any nginx config. It only writes cert files
#   # to /etc/letsencrypt/live/.
#
# Stage 2 (swap to TLS): replace this file with the contents of
#   infra/nginx/assessments.revenueinstitute.com.tls.conf
#   sudo cp infra/nginx/assessments.revenueinstitute.com.tls.conf \
#     /etc/nginx/sites-available/assessments.revenueinstitute.com.conf
#   sudo nginx -t                              # MUST pass before reload
#   sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name assessments.revenueinstitute.com;

    # Let's Encrypt ACME challenges. Must precede the proxy block so
    # certbot's renewal traffic doesn't get proxied at the Next.js apps.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Generous body cap so candidates can submit large notebook artifacts
    # via the same proxy path as everything else.
    client_max_body_size 10M;

    # /a/* belongs to the candidate Next.js app. The admin owns the root.
    # Matches the rewrite documented in apps/admin/next.config.ts.
    location /a/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:13000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
