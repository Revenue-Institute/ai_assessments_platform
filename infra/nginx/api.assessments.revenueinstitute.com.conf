# BOOTSTRAP nginx server block for the FastAPI public API. HTTP only;
# handles the ACME http-01 challenge for certbot certonly. Replace with
# infra/nginx/api.assessments.revenueinstitute.com.tls.conf after certs
# are issued. See assessments.revenueinstitute.com.conf for the full
# two-stage runbook.

# SSE endpoints (spec §7.1, §9.1, §12.2) require unbuffered streaming;
# proxy_buffering off + proxy_cache off + a long read timeout keep the
# event stream open and keep frames flushing as they arrive from FastAPI.
server {
    listen 80;
    listen [::]:80;
    server_name api.assessments.revenueinstitute.com;

    client_max_body_size 10M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location ~ ^/(api/scoring-events|api/generation-events|api/generator/runs/[^/]+/events|a/[^/]+/code/run) {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
