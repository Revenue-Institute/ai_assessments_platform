# FINAL nginx server block for the candidate + admin single-host front
# door. Drops in over assessments.revenueinstitute.com.conf after
# certbot certonly has issued certs.
#
# Install:
#   sudo cp infra/nginx/assessments.revenueinstitute.com.tls.conf \
#     /etc/nginx/sites-available/assessments.revenueinstitute.com.conf
#   sudo nginx -t                              # MUST pass before reload
#   sudo systemctl reload nginx
#
# certbot's renew cron handles cert renewal; the http-01 challenge keeps
# working because the :80 block still serves /.well-known/acme-challenge/.

# :80 stays alive for ACME renewals and redirects all other traffic to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name assessments.revenueinstitute.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name assessments.revenueinstitute.com;

    ssl_certificate /etc/letsencrypt/live/assessments.revenueinstitute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/assessments.revenueinstitute.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    # Candidate ships its HTML with assetPrefix "/a", so chunks are
    # requested at /a/_next/... . The Next.js standalone server only
    # serves them at /_next/... , so strip the /a before proxying.
    # Regex wins over the /a/ prefix location below.
    location ~ ^/a(/_next/.*)$ {
        proxy_pass http://127.0.0.1:13001$1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # /a/* belongs to the candidate Next.js app. The admin owns the root.
    location /a/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:13000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
