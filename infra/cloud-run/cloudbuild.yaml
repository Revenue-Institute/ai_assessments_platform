# Cloud Build pipeline for apps/api. Triggered manually via:
#   gcloud builds submit --config infra/cloud-run/cloudbuild.yaml \
#     --substitutions=_TAG=$(git rev-parse --short HEAD)
# or wired to a GitHub trigger that fires on pushes to main.

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/ri-assessments-api:${_TAG}
      - apps/api
  - name: gcr.io/cloud-builders/docker
    args: [push, "gcr.io/$PROJECT_ID/ri-assessments-api:${_TAG}"]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ri-assessments-api
      - --project=$PROJECT_ID
      - --region=${_REGION}
      - --image=gcr.io/$PROJECT_ID/ri-assessments-api:${_TAG}
      - --platform=managed
      - --allow-unauthenticated
      - --concurrency=30
      - --timeout=300s
      - --memory=1Gi
      - --port=8000

substitutions:
  _TAG: latest
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - gcr.io/$PROJECT_ID/ri-assessments-api:${_TAG}
