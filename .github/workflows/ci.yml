name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Sync deps
        working-directory: apps/api
        run: uv sync --frozen
      - name: Ruff
        working-directory: apps/api
        run: uv run ruff check src
      - name: Pytest
        working-directory: apps/api
        run: uv run pytest -q

  frontend:
    name: admin + candidate (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run --filter admin --filter candidate typecheck
      - name: Admin vitest
        run: bun --filter admin test
      - name: Candidate vitest
        run: bun --filter candidate test
      - name: Integrity vitest
        run: bun --filter @repo/integrity test
      - name: Schemas vitest
        run: bun --filter @repo/schemas test

  lint:
    name: copy + boundaries lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # check-copy.ts + check-boundaries.ts run via
      # `node --experimental-strip-types`, which needs Node 22.6+ for the
      # native TS stripping flag. The ubuntu-latest default Node is too
      # old, so pin explicitly.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - name: bun run check (ultracite + check-copy + check-boundaries)
        run: bun run check

  schemas-codegen:
    name: zod -> pydantic codegen drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - working-directory: apps/api
        run: uv sync --frozen
      - name: Regenerate Pydantic models from Zod
        run: bash apps/api/scripts/gen_schemas.sh
      - name: Fail on drift between Zod and committed Pydantic mirror
        # The generated tree is committed under
        # apps/api/src/ri_assessments_api/generated/. Any change to
        # packages/schemas/src/*.ts must be paired with a regen + commit,
        # or this diff fails the build. Previous CI only diffed against a
        # gitignored output dir and was a silent no-op.
        run: |
          if ! git diff --exit-code -- apps/api/src/ri_assessments_api/generated; then
            echo "::error::Zod -> Pydantic codegen drift detected."
            echo "Run \`bash apps/api/scripts/gen_schemas.sh\` locally and commit the diff."
            exit 1
          fi

  # Non-blocking dependency vulnerability scan. Goal is signal for triage,
  # not gating PRs. Promote to required once findings settle.
  security-audit:
    name: security audit (pip-audit + bun audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Sync API deps (with dev group for pip-audit)
        working-directory: apps/api
        run: uv sync --frozen
      - name: pip-audit (apps/api)
        working-directory: apps/api
        # pip-audit reads the project metadata + the locked environment uv
        # just synced. Non-zero exit is allowed by continue-on-error.
        run: uv run pip-audit --strict
        continue-on-error: true
      - name: bun install (workspace)
        run: bun install --frozen-lockfile
      - name: bun audit
        # `bun audit` is the modern invocation; if the runner ships a bun
        # without it, fall back to npm audit on the workspaces so the job
        # still produces signal.
        run: |
          if bun audit --help >/dev/null 2>&1; then
            bun audit || true
          else
            npm audit --workspaces=true || true
          fi
        continue-on-error: true
