name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Sync deps
        working-directory: apps/api
        run: uv sync --frozen
      - name: Ruff
        working-directory: apps/api
        run: uv run ruff check src
      - name: Pytest
        working-directory: apps/api
        run: uv run pytest -q

  frontend:
    name: admin + candidate (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run --filter admin --filter candidate typecheck
